name: Release

on:
  release:
    types: [created]

env:
  RUST_BACKTRACE: "1"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify tag matches Cargo.toml version
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml)
          TAG="${{ github.event.release.tag_name }}"
          if [ "${TAG}" != "${VERSION}" ]; then
            echo "Tag ${TAG} does not match Cargo.toml version ${VERSION}"
            exit 1
          fi

  build-linux:
    needs: check-version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libwayland-dev \
            libasound2-dev \
            libudev-dev \
            pkg-config \
            wget

      - name: Package (Linux)
        run: cargo run --bin release linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/hallways-*-linux-*
          if-no-files-found: error

  build-windows:
    needs: check-version
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Package (Windows)
        run: cargo run --bin release windows

      - uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/hallways-*-windows-*
          if-no-files-found: error

  release:
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/**/hallways-*-linux-*
            dist/**/hallways-*-windows-*
